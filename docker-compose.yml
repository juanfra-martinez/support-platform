# Full-stack orchestration for the Enterprise Support Ticket Platform.
#
#   postgres   PostgreSQL 16 (data + init scripts)
#   rabbitmq   RabbitMQ 3.13 with management UI
#   migrate    one-off: sync the Prisma schema, then exit
#   backend    NestJS API (producer + HTTP) on :3000
#   worker     NestJS consumers (notifications, audit, analytics) on :3001
#   frontend   Angular SPA served by nginx, proxying /api -> backend
#
# Quick start:
#   cp .env.example .env
#   docker compose up --build
#   # first run only, to load demo data:
#   docker compose --profile seed run --rm seed
#
# Then open http://localhost:${FRONTEND_PORT:-8080}

services:
  postgres:
    image: postgres:16-alpine
    container_name: support-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [support-net]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: support-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - '${RABBITMQ_PORT:-5672}:5672'
      - '${RABBITMQ_MGMT_PORT:-15672}:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 20s
    networks: [support-net]

  # One-off schema sync. Uses the build stage (Prisma CLI present) and exits.
  migrate:
    build:
      context: ./backend
      target: build
    image: support-platform-api-build:local
    container_name: support-migrate
    command: ['npx', 'prisma', 'db', 'push', '--skip-generate']
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    networks: [support-net]

  # Optional demo-data loader: `docker compose --profile seed run --rm seed`
  seed:
    build:
      context: ./backend
      target: build
    image: support-platform-api-build:local
    container_name: support-seed
    command: ['npx', 'prisma', 'db', 'seed']
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      migrate:
        condition: service_completed_successfully
    profiles: [seed]
    restart: 'no'
    networks: [support-net]

  backend:
    build:
      context: ./backend
      target: runtime
    image: support-platform-api:local
    container_name: support-backend
    restart: unless-stopped
    command: ['node', 'dist/main.js']
    environment:
      NODE_ENV: production
      PORT: 3000
      API_GLOBAL_PREFIX: api
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      RABBITMQ_URI: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      RABBITMQ_EXCHANGE: support.events
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [support-net]

  worker:
    build:
      context: ./backend
      target: runtime
    image: support-platform-api:local
    container_name: support-worker
    restart: unless-stopped
    command: ['node', 'dist/worker.js']
    environment:
      NODE_ENV: production
      WORKER_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      RABBITMQ_URI: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      RABBITMQ_EXCHANGE: support.events
      CONSUMER_MAX_RETRIES: ${CONSUMER_MAX_RETRIES:-3}
      # Secrets are validated at boot by the shared config schema.
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [support-net]

  frontend:
    build:
      context: ./frontend
    image: support-platform-web:local
    container_name: support-frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-8080}:80'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:80/']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [support-net]

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  support-net:
    driver: bridge
